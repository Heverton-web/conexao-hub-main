version: "3.8"

services:

## --------------------------- CONEXÃO HUB --------------------------- ##

  app:
    build:
      context: .
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY}
        - VITE_OPENAI_API_KEY=${VITE_OPENAI_API_KEY}
    
    container_name: conexao_hub_app
    restart: always

    # Adicionado mapeamento de porta para acesso direto via IP enquanto o Traefik não é configurado
    ports:
      - "8080:80"

    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M

    networks:
      - network_conexao

    environment:
      - NODE_ENV=production
      - TZ=America/Sao_Paulo
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY}
      - VITE_OPENAI_API_KEY=${VITE_OPENAI_API_KEY}

## --------------------------- INFRA --------------------------- ##

networks:
  network_conexao:
    driver: bridge # O próprio Docker vai criar essa rede de forma correta e aberta
