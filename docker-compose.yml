version: "3.8"

services:

## --------------------------- CONEXÃO HUB --------------------------- ##

  app:
    # Seção de Build: Necessária para construir a imagem na VPS a partir do código
    build:
      context: .
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY}
        - VITE_OPENAI_API_KEY=${VITE_OPENAI_API_KEY}
    
    container_name: conexao_hub_app
    restart: always

    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M

    networks:
      - network_conexao

    environment:
      - NODE_ENV=production
      - TZ=America/Sao_Paulo
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY}
      - VITE_OPENAI_API_KEY=${VITE_OPENAI_API_KEY}

    ## 🌐 Configurações Traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.conexao_hub.rule=Host(`hub.vpsconexao.org`)"
      - "traefik.http.routers.conexao_hub.entrypoints=websecure"
      - "traefik.http.routers.conexao_hub.tls.certresolver=letsencryptresolver"
      - "traefik.http.services.conexao_hub.loadbalancer.server.port=80"

## --------------------------- INFRA --------------------------- ##

networks:
  network_conexao:
    external: true
    name: network_conexao
