version: "3.8"

services:

## --------------------------- CONEXÃO HUB --------------------------- ##

  app:
    build:
      context: .
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY}
        - VITE_OPENAI_API_KEY=${VITE_OPENAI_API_KEY}
    
    container_name: conexao_hub_app
    restart: always

    # No modo Traefik, não expomos portas diretamente para o mundo
    # O Traefik cuida disso na porta 80/443
    
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M

    networks:
      - network_conexao

    environment:
      - NODE_ENV=production
      - TZ=America/Sao_Paulo
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY}
      - VITE_OPENAI_API_KEY=${VITE_OPENAI_API_KEY}

    ## 🌐 Configurações para o seu Traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.conexao_hub.rule=Host(`hub.vpsconexao.org`)"
      - "traefik.http.routers.conexao_hub.entrypoints=websecure"
      - "traefik.http.routers.conexao_hub.tls.certresolver=letsencryptresolver" # Confirme se este é o nome do seu resolver de SSL
      - "traefik.http.services.conexao_hub.loadbalancer.server.port=80"

## --------------------------- INFRA --------------------------- ##

networks:
  network_conexao:
    external: true
    name: network_conexao
